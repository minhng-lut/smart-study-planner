version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Portainer CE — container / swarm management UI
# Path: https://lut.longle77.site/portainer/
# ─────────────────────────────────────────────────────────────────────────────

networks:
  traefik-public:
    external: true
  portainer-agent:
    driver: overlay
    attachable: true

volumes:
  portainer-data:
    name: portainer-data

services:
  # ── Portainer Agent (global — runs on every swarm node) ─────────────────────
  portainer-agent:
    image: portainer/agent:latest
    environment:
      AGENT_CLUSTER_ADDR: tasks.portainer-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/volumes:/var/lib/docker/volumes:ro
    networks:
      - portainer-agent
    deploy:
      mode: global
      placement:
        constraints:
          - node.platform.os == linux
      restart_policy:
        condition: on-failure
        delay: 5s

  # ── Portainer CE (manager only) ──────────────────────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    command:
      - --admin-password-file=/run/secrets/portainer_admin_password
    secrets:
      - portainer_admin_password
    volumes:
      - portainer-data:/data
    networks:
      - traefik-public
      - portainer-agent
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public

        # ── Router ─────────────────────────────────────────────────────────────
        # Accessible at: https://lut.longle77.site/portainer/
        - traefik.http.routers.portainer.rule=Host(`lut.longle77.site`) && PathPrefix(`/portainer`)
        - traefik.http.routers.portainer.entrypoints=websecure
        - traefik.http.routers.portainer.tls=true
        - traefik.http.routers.portainer.tls.certresolver=letsencrypt
        # Strip /portainer prefix — Portainer serves at / internally
        - traefik.http.routers.portainer.middlewares=portainer-strip
        - traefik.http.middlewares.portainer-strip.stripprefix.prefixes=/portainer

        # ── Backend service ────────────────────────────────────────────────────
        - traefik.http.services.portainer.loadbalancer.server.port=9000

secrets:
  portainer_admin_password:
    external: true
