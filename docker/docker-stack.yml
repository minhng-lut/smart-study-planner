services:
  traefik:
    image: traefik:v3.2
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
      - target: 8082
        published: 8082
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../infrastructure/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - public
    deploy:
      placement:
        constraints:
          - node.role == manager

  frontend:
    image: cloud-skeleton/frontend:latest
    env_file:
      - ../services/frontend/.env.example
    networks:
      - public
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.routers.frontend.rule=PathPrefix(`/`)
        - traefik.http.routers.frontend.entrypoints=web
        - traefik.http.routers.frontend.priority=1
        - traefik.http.services.frontend.loadbalancer.server.port=80
      replicas: 1

  backend:
    image: cloud-skeleton/backend:latest
    env_file:
      - ../services/backend/.env.example
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/app?schema=public
    networks:
      - public
      - internal
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.routers.backend.rule=PathPrefix(`/api`)
        - traefik.http.routers.backend.entrypoints=web
        - traefik.http.routers.backend.priority=10
        - traefik.http.routers.backend.middlewares=backend-strip
        - traefik.http.middlewares.backend-strip.stripprefix.prefixes=/api
        - traefik.http.services.backend.loadbalancer.server.port=3000
      replicas: 1

  python-service:
    image: cloud-skeleton/python-service:latest
    env_file:
      - ../services/python-service/.env.example
    networks:
      - public
      - internal
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.routers.python.rule=PathPrefix(`/python`)
        - traefik.http.routers.python.entrypoints=web
        - traefik.http.routers.python.priority=10
        - traefik.http.routers.python.middlewares=python-strip
        - traefik.http.middlewares.python-strip.stripprefix.prefixes=/python
        - traefik.http.services.python.loadbalancer.server.port=8000
      replicas: 1

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    deploy:
      replicas: 1

  prometheus:
    image: prom/prometheus:v3.2.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ../infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - internal
      - public
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.routers.prometheus.rule=PathPrefix(`/prometheus`)
        - traefik.http.routers.prometheus.entrypoints=web
        - traefik.http.routers.prometheus.middlewares=prometheus-strip
        - traefik.http.middlewares.prometheus-strip.stripprefix.prefixes=/prometheus
        - traefik.http.services.prometheus.loadbalancer.server.port=9090
      replicas: 1

  loki:
    image: grafana/loki:3.3.2
    command:
      - -config.file=/etc/loki/loki-config.yml
    volumes:
      - ../infrastructure/monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - internal
    deploy:
      replicas: 1

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ../infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - internal
      - public
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.routers.grafana.rule=PathPrefix(`/grafana`)
        - traefik.http.routers.grafana.entrypoints=web
        - traefik.http.routers.grafana.middlewares=grafana-strip
        - traefik.http.middlewares.grafana-strip.stripprefix.prefixes=/grafana
        - traefik.http.services.grafana.loadbalancer.server.port=3000
      replicas: 1

  portainer:
    image: portainer/portainer-ce:2.27.1
    command:
      - -H
      - unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - public
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.routers.portainer.rule=PathPrefix(`/portainer`)
        - traefik.http.routers.portainer.entrypoints=web
        - traefik.http.routers.portainer.middlewares=portainer-strip
        - traefik.http.middlewares.portainer-strip.stripprefix.prefixes=/portainer
        - traefik.http.services.portainer.loadbalancer.server.port=9000
      replicas: 1

networks:
  public:
    driver: overlay
    attachable: true
  internal:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
  grafana_data:
  loki_data:
  portainer_data:
