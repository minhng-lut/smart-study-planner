name: checks

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main
      - production
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/app?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install repository tooling
        run: npm install

      - name: Check formatting
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Install frontend dependencies
        working-directory: services/frontend
        run: npm install

      - name: Install backend dependencies
        working-directory: services/backend
        run: npm install

      - name: Install python service dependencies
        working-directory: services/python-service
        run: pip install -r requirements.txt

      - name: Build frontend Docker image (no push)
        run: docker build -t lut-frontend:ci ./services/frontend

      - name: Build backend Docker image (no push)
        run: docker build -t lut-backend:ci ./services/backend
