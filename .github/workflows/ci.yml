name: ci

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main
      - production

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/app?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install repository tooling
        run: npm install

      - name: Check formatting
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Install frontend dependencies
        working-directory: services/frontend
        run: npm install

      - name: Install backend dependencies
        working-directory: services/backend
        run: npm install

      - name: Install python service dependencies
        working-directory: services/python-service
        run: pip install -r requirements.txt

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/lut:frontend-latest ./services/frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/lut:frontend-latest

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/lut:backend-latest ./services/backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/lut:backend-latest

      # - name: Build python service image
      #   run: docker build -t python-service:ci ./services/python-service

      - name: Trigger Portainer redeploy
        run: curl -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
